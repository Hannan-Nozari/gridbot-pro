services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    networks:
      - gridbot

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=https://tradinix.com/api/v1
        - NEXT_PUBLIC_WS_URL=wss://tradinix.com/ws
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://tradinix.com/api/v1
      - NEXT_PUBLIC_WS_URL=wss://tradinix.com/ws
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - gridbot

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - gridbot

networks:
  gridbot:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
